name: Sync jr-wiki to DB

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build manifest
        run: bun run build.ts

      - name: Sync to MongoDB
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          API_URL: https://api.jiangren.com.au
        run: bun run sync-to-db.ts
