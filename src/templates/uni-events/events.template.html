<!DOCTYPE html>

<style>
:root {
  --ink: #160a2c;
  --bg: #fef8f1;
  --muted: #71628a;
  --border-soft: rgba(106, 72, 170, 0.12);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Noto Sans SC', system-ui, sans-serif;
  padding: 32px 20px 80px;
  line-height: 1.6;
}
.page { max-width: 1400px; margin: 0 auto; }

.breadcrumb {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 12px; color: var(--muted);
  margin-bottom: 20px;
  display: flex; align-items: center; gap: 8px;
}
.breadcrumb a { color: var(--muted); text-decoration: none; }
.breadcrumb a:hover { color: #ff5757; }
.breadcrumb .sep { opacity: 0.5; }
.breadcrumb .current { color: #ff5757; font-weight: 700; }

.page-head {
  background: linear-gradient(135deg, #ff5757, #ff8a3d, #ffd44d);
  border-radius: 24px;
  padding: 36px 40px;
  margin-bottom: 32px;
  color: #fff;
  box-shadow: 0 20px 60px rgba(255, 87, 87, 0.2);
}
.page-head h1 {
  font-family: 'Playfair Display', 'Noto Sans SC', sans-serif;
  font-size: 36px; font-weight: 900;
  letter-spacing: -0.03em;
  margin-bottom: 6px;
}
.page-head h1 em { font-style: italic; }
.page-head .meta {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px; color: rgba(255, 255, 255, 0.85);
  letter-spacing: 0.08em;
}
.page-head .intro {
  margin-top: 14px;
  font-size: 14px;
  line-height: 1.75;
  color: rgba(255,255,255,0.95);
  max-width: 760px;
}

.schools {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
@media (max-width: 1100px) { .schools { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 600px)  { .schools { grid-template-columns: 1fr; } }

.school {
  background: rgba(255, 255, 255, 0.95);
  border: 1px solid var(--border-soft);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 8px 28px rgba(16, 22, 47, 0.06);
  display: flex; flex-direction: column;
}
.school-cover {
  padding: 24px 22px 20px;
  color: #fff;
}
.school-cover h2 {
  font-family: 'Playfair Display', 'Noto Sans SC', serif;
  font-size: 22px; font-weight: 900;
  letter-spacing: -0.02em;
  margin-bottom: 4px;
}
.school-cover .name-cn {
  font-size: 13px; color: rgba(255, 255, 255, 0.85); font-weight: 500;
}
.school-cover .code {
  font-family: 'Space Grotesk', monospace;
  font-size: 10px; letter-spacing: 0.2em;
  opacity: 0.7; margin-top: 8px;
}

.school-body { padding: 20px 22px 24px; flex: 1; display: flex; flex-direction: column; }
.school-body h3 {
  font-size: 12px; font-weight: 700; letter-spacing: 0.08em;
  color: var(--muted); text-transform: uppercase;
  margin-bottom: 12px;
}
.event-list { display: flex; flex-direction: column; gap: 14px; margin-bottom: 18px; }
.event {
  padding: 12px 14px;
  background: #fafafd;
  border-radius: 12px;
  border: 1px solid var(--border-soft);
}
.event .event-title {
  font-size: 14px; font-weight: 700; color: var(--ink);
  margin-bottom: 6px; line-height: 1.45;
}
.event .event-meta {
  font-size: 11px; color: var(--muted);
  display: flex; flex-wrap: wrap; gap: 8px;
}
.event .event-meta .price {
  display: inline-block; padding: 1px 8px;
  background: #d1fae5; color: #059669;
  border-radius: 4px; font-weight: 700;
  font-family: 'Space Grotesk', monospace;
}
.event .event-meta .price.paid {
  background: #fef3c7; color: #b45309;
}
.event a { color: #ff5757; text-decoration: none; font-weight: 600; }
.no-events {
  padding: 20px;
  text-align: center;
  color: var(--muted);
  font-size: 13px;
  font-style: italic;
  background: #fafafd;
  border-radius: 12px;
  border: 1px dashed var(--border-soft);
}

.xhs-draft {
  margin-top: auto;
  padding: 16px 18px;
  background: #1a0f2e;
  color: #f5f5f5;
  border-radius: 12px;
}
.xhs-draft h4 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 11px; letter-spacing: 0.08em;
  color: #ffd44d; margin-bottom: 8px;
}
.xhs-draft .title {
  font-size: 14px; font-weight: 700;
  margin-bottom: 8px;
}
.xhs-draft .body {
  font-size: 12px; line-height: 1.75;
  color: rgba(245, 245, 245, 0.85);
  white-space: pre-wrap;
  margin-bottom: 10px;
}
.xhs-draft .tags {
  font-size: 11px; color: #ff8a3d;
  font-family: 'Space Grotesk', monospace;
}

footer { text-align: center; margin-top: 40px; color: var(--muted); font-size: 12px; }
</style>

{{SCHOOL_CARDS}}

  <footer>

  </footer>
</div>
