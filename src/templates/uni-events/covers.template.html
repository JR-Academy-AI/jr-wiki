<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>校园活动封面 · {{DATE}} · 6 校 XHS 封面图</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800;900&family=Space+Grotesk:wght@500;700&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #160a2c;
  --bg: #eef0f4;
  --muted: #71628a;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Noto Sans SC', system-ui, sans-serif;
  padding: 32px 20px 80px;
  line-height: 1.5;
}
.page { max-width: 1500px; margin: 0 auto; }

.page-head {
  background: #fff; border: 2px solid var(--ink);
  border-radius: 20px;
  padding: 26px 32px; margin-bottom: 28px;
  box-shadow: 8px 8px 0 var(--ink);
}
.page-head h1 {
  font-family: 'Playfair Display', 'Noto Sans SC', serif;
  font-size: 26px; font-weight: 900;
}
.page-head .sub {
  margin-top: 10px; color: var(--muted); font-size: 13px;
  line-height: 1.7; max-width: 900px;
}
.page-head .acts { margin-top: 16px; display: flex; gap: 10px; flex-wrap: wrap; }
.btn {
  font-family: 'Space Grotesk', monospace;
  font-size: 13px; font-weight: 700;
  padding: 9px 16px; cursor: pointer;
  border: 2px solid var(--ink); background: #fff; color: var(--ink);
  border-radius: 10px; transition: all 0.12s;
}
.btn:hover:not(:disabled) {
  transform: translate(-2px, -2px); box-shadow: 4px 4px 0 var(--ink);
}
.btn:disabled { opacity: 0.55; cursor: wait; }
.btn.primary { background: #ff5757; color: #fff; border-color: #ff5757; }

/* Scale factor: 0.4 → 1242×1660 渲染为 497×664 可视区 */
.covers-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(510px, 1fr));
  gap: 32px;
}

.cover-frame {
  display: flex; flex-direction: column; align-items: stretch;
}
.cover-frame .label {
  font-size: 13px; font-weight: 900; color: var(--ink);
  margin-bottom: 12px;
}
.cover-frame .label em { font-style: normal; color: var(--muted); font-weight: 600; font-size: 12px; margin-left: 10px; }

/* scaler 固定 497×664 视窗（0.4× 原图），cover 绝对定位填满它 */
.cover-scaler {
  width: 100%;
  max-width: 497px;
  aspect-ratio: 1242 / 1660;
  background: #d8dae0;
  border-radius: 12px;
  overflow: hidden;
  position: relative;
  margin: 0 auto;
}
.cover {
  width: 1242px; height: 1660px;
  position: absolute;
  top: 0; left: 0;
  transform-origin: top left;
  transform: scale(0.4);
  display: flex; flex-direction: column;
  color: #fff;
  font-family: 'Noto Sans SC', sans-serif;
  overflow: hidden;
}
.cover::before {
  content: ''; position: absolute; inset: 0;
  background-image:
    radial-gradient(circle at 10% 20%, rgba(255,255,255,0.15) 0%, transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(255,255,255,0.08) 0%, transparent 50%);
  pointer-events: none;
}
.cover-inner {
  position: relative; z-index: 1;
  padding: 100px 80px 90px;
  display: flex; flex-direction: column; gap: 40px;
  height: 100%;
}
.cover .code {
  font-family: 'Space Grotesk', monospace;
  font-size: 56px; font-weight: 700;
  letter-spacing: 0.15em; opacity: 0.85;
}
.cover .name-cn {
  font-family: 'Playfair Display', 'Noto Sans SC', serif;
  font-size: 104px; font-weight: 900; line-height: 1.1;
  letter-spacing: -0.02em;
}
.cover .name-en {
  font-family: 'Playfair Display', serif;
  font-size: 52px; font-style: italic; font-weight: 700;
  opacity: 0.92; letter-spacing: -0.01em;
  margin-top: -12px;
}
.cover .date-chip {
  display: inline-block;
  padding: 18px 36px;
  background: #ffce44; color: #10162f;
  border-radius: 100px; border: 3px solid #10162f;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 52px; font-weight: 900;
  align-self: flex-start;
}
.cover .events-list {
  display: flex; flex-direction: column; gap: 26px;
  margin-top: auto;
  flex: 1; justify-content: flex-end;
}
.cover .event-hook {
  padding: 30px 36px;
  background: rgba(255, 255, 255, 0.18);
  border-left: 10px solid rgba(255, 255, 255, 0.95);
  border-radius: 16px;
}
.cover .event-hook .title {
  font-size: 64px; font-weight: 900; line-height: 1.22;
  margin-bottom: 14px;
}
.cover .event-hook .meta {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 40px; font-weight: 500; opacity: 0.95;
  line-height: 1.5;
}
.cover .bottom {
  display: flex; justify-content: space-between; align-items: center;
  padding-top: 36px;
  border-top: 2px solid rgba(255, 255, 255, 0.3);
}
.cover .bottom .label {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 36px; font-weight: 700; letter-spacing: 0.05em;
  opacity: 0.95;
}
.cover .bottom .slogan {
  font-size: 30px; font-weight: 600; opacity: 0.85;
}
.cover .placeholder {
  padding: 60px 40px;
  background: rgba(255, 255, 255, 0.1);
  border: 3px dashed rgba(255, 255, 255, 0.45);
  border-radius: 16px;
  text-align: center;
  font-size: 56px; font-weight: 800;
  line-height: 1.4;
  opacity: 0.9;
}

.cover-frame .dl-btn {
  margin-top: 12px;
  padding: 11px 18px;
  font-family: 'Space Grotesk', monospace;
  font-size: 13px; font-weight: 700;
  background: #10162f; color: #fff;
  border: 2px solid #10162f; border-radius: 10px;
  cursor: pointer;
  transition: all 0.12s;
}
.cover-frame .dl-btn:hover:not(:disabled) { background: #ff5757; border-color: #ff5757; transform: translate(-2px, -2px); box-shadow: 4px 4px 0 #10162f; }
.cover-frame .dl-btn:disabled { opacity: 0.6; cursor: wait; }
</style>
</head>
<body>
<div class="page">
  <div class="page-head">
    <h1>📱 校园活动封面 · {{DATE}} · 6 校 XHS 封面图</h1>
    <div class="sub">1242×1660 竖版，小红书封面首图。每张支持单独下载 PNG。封号红线：不含 JR Academy / 域名 / 微信号 / 二维码。</div>
    <div class="acts">
      <a class="btn" href="./{{DATE}}.html">← 回活动详情页</a>
      <button class="btn primary" id="dl-all">⬇ 一键全部下载 6 张</button>
    </div>
  </div>

  <div class="covers-grid">
{{COVER_FRAMES}}
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
async function dlOne(target, slug) {
  const el = document.getElementById(target);
  if (!el) return;
  if (document.fonts && document.fonts.ready) await document.fonts.ready;

  // Clone offscreen at 1:1 scale
  const stage = document.createElement('div');
  stage.style.cssText = 'position:fixed;left:-10000px;top:-10000px;width:1242px;height:1660px;overflow:hidden;background:transparent;z-index:-1;';
  const clone = el.cloneNode(true);
  clone.id = '';
  clone.style.transform = 'none';
  clone.style.marginBottom = '0';
  stage.appendChild(clone);
  document.body.appendChild(stage);

  try {
    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
    const canvas = await html2canvas(clone, {
      backgroundColor: null, scale: 2,
      width: 1242, height: 1660,
      windowWidth: 1242, windowHeight: 1660,
      useCORS: true, allowTaint: true, logging: false,
    });
    const link = document.createElement('a');
    link.download = slug + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } finally {
    if (stage.parentNode) stage.parentNode.removeChild(stage);
  }
}

document.querySelectorAll('.dl-btn[data-target]').forEach(btn => {
  btn.addEventListener('click', async () => {
    const orig = btn.textContent;
    btn.disabled = true; btn.textContent = '渲染中…';
    try { await dlOne(btn.dataset.target, btn.dataset.slug); btn.textContent = '✅ 已下载'; }
    catch (e) { console.error(e); btn.textContent = '❌ 失败'; }
    finally { setTimeout(() => { btn.disabled = false; btn.textContent = orig; }, 1200); }
  });
});

document.getElementById('dl-all').addEventListener('click', async () => {
  const btn = document.getElementById('dl-all');
  const orig = btn.textContent;
  btn.disabled = true; btn.textContent = '下载中...';
  const btns = document.querySelectorAll('.dl-btn[data-target]');
  for (const b of btns) {
    b.click();
    await new Promise(r => setTimeout(r, 1500));
  }
  btn.disabled = false; btn.textContent = orig;
});
</script>
</body>
</html>
