<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>阿德莱德大学 · 社交素材</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800;900&family=Space+Grotesk:wght@500;700&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
<style>
  :root { --pri-deep:#001a38; --pri:#002f5f; --pri-light:#1a4d8a; --gold:#ff5757; --text-on:#ffffff; --ink:#160a2c; --bg:#f6f1ff; --muted:#71628a; --border-soft:rgba(106,72,170,0.12); }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: radial-gradient(circle at top left, rgba(124,58,237,0.1), transparent 30%), var(--bg); color:var(--ink); font-family:"Noto Sans SC",system-ui,sans-serif; padding:32px 20px 80px; line-height:1.65; }
  .page { max-width:1100px; margin:0 auto; }
  .breadcrumb { font-family:"Space Grotesk",sans-serif; font-size:12px; color:var(--muted); margin-bottom:20px; display:flex; align-items:center; gap:8px; }
  .breadcrumb a { color:var(--muted); text-decoration:none; }
  .breadcrumb a:hover { color:var(--pri); }
  .breadcrumb .sep { opacity:0.5; }
  .breadcrumb .current { color:var(--pri); font-weight:700; }
  .school-head { background:linear-gradient(145deg, var(--pri-deep), var(--pri), var(--pri-light)); border-radius:28px; padding:48px 44px; margin-bottom:32px; color:var(--text-on); box-shadow:0 20px 60px rgba(53,18,102,0.1); position:relative; overflow:hidden; }
  .school-head::after { content:""; position:absolute; inset:0; background-image:radial-gradient(rgba(255,255,255,0.1) 1px, transparent 1px); background-size:22px 22px; opacity:0.3; pointer-events:none; }
  .school-head > * { position:relative; z-index:1; }
  .school-head .code { font-family:"Space Grotesk",sans-serif; font-size:13px; font-weight:700; letter-spacing:0.25em; color:var(--gold); margin-bottom:8px; }
  .school-head h1 { font-family:"Playfair Display","Noto Sans SC",sans-serif; font-size:40px; font-weight:900; letter-spacing:-0.03em; line-height:1.1; }
  .school-head .name-en { font-family:"Space Grotesk",sans-serif; font-size:17px; font-weight:600; color:rgba(255,255,255,0.75); margin-top:6px; }
  .empty { padding:60px 30px; text-align:center; background:rgba(255,255,255,0.6); border:1px dashed var(--border-soft); border-radius:20px; color:var(--muted); }
  .empty .emj { font-size:48px; margin-bottom:12px; }
  .empty h3 { color:var(--ink); font-weight:900; font-size:18px; margin-bottom:10px; font-family:"Playfair Display","Noto Sans SC",sans-serif; }
  .empty p { font-size:13px; line-height:1.8; max-width:520px; margin:0 auto; }
  .empty code { background:rgba(124,58,237,0.1); color:var(--pri); padding:3px 9px; border-radius:5px; font-family:"Space Grotesk",monospace; font-size:12px; }
  @media (max-width:700px) { body { padding:24px 14px 60px; } .school-head { padding:32px 24px; } .school-head h1 { font-size:28px; } .school-head .name-en { font-size:14px; } }
</style>
</head>
<body>
<div class="page">
  <div class="breadcrumb"><a href="../">← 素材库</a><span class="sep">/</span><span class="current">阿德莱德大学</span></div>
  <div class="school-head">
    <div class="code">UNIVERSITY OF ADELAIDE</div>
    <h1>阿德莱德大学</h1>
    <div class="name-en">University of Adelaide · Adelaide, SA</div>
  </div>
  <div class="empty">
    <div class="emj">📭</div>
    <h3>还没有产出</h3>
    <p>跑 <code>/uni-news-poster [date] adelaide</code> 产出首条内容，产出后把新 item 插进本页 timeline。<br>上游新闻 md 在 <code>src/content/universities/adelaide/news-*.md</code>。</p>
  </div>
</div>
</body>
</html>
