<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>AI 文章 · 日报 + 原创 · 最新</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800;900&family=Space+Grotesk:wght@500;700&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #10162f;
    --bg: #fef8f1;
    --muted: #64748b;
    --brand-red: #ff5757;
    --brand-dark: #10162f;
    --brand-gold: #ffd44d;
    --border-soft: rgba(16, 22, 47, 0.1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background:
      radial-gradient(circle at top left, rgba(255, 87, 87, 0.08), transparent 30%),
      var(--bg);
    color: var(--ink);
    font-family: 'Noto Sans SC', system-ui, sans-serif;
    padding: 40px 20px 80px;
    line-height: 1.6;
  }
  .page { max-width: 1100px; margin: 0 auto; }

  .breadcrumb {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px; color: var(--muted);
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 8px;
  }
  .breadcrumb a { color: var(--muted); text-decoration: none; }
  .breadcrumb a:hover { color: var(--brand-red); }
  .breadcrumb .sep { opacity: 0.5; }
  .breadcrumb .current { color: var(--brand-red); font-weight: 700; }

  .hero {
    background: linear-gradient(135deg, #10162f 0%, #1e2a5e 50%, #ff5757 110%);
    border-radius: 28px;
    padding: 44px 40px;
    margin-bottom: 36px;
    color: #fff;
    box-shadow: 0 20px 60px rgba(16, 22, 47, 0.18);
    position: relative; overflow: hidden;
  }
  .hero::before {
    content: ''; position: absolute; top: -100px; right: -60px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(255,212,77,0.3), transparent 60%);
  }
  .hero > * { position: relative; }
  .hero h1 {
    font-family: 'Playfair Display', 'Noto Sans SC', sans-serif;
    font-size: 40px; font-weight: 900;
    letter-spacing: -0.03em; margin-bottom: 10px;
  }
  .hero h1 em { color: var(--brand-gold); font-style: italic; }
  .hero .sub {
    font-size: 14px; color: rgba(255,255,255,0.88);
    max-width: 720px; line-height: 1.75;
  }
  .hero .sub code {
    background: rgba(255,255,255,0.18);
    padding: 2px 8px; border-radius: 5px;
    font-family: 'Space Grotesk', monospace; font-size: 12px;
  }
  .hero .stats {
    display: flex; gap: 24px; margin-top: 22px;
    padding-top: 22px;
    border-top: 1px solid rgba(255,255,255,0.25);
    flex-wrap: wrap;
  }
  .hero .stat .n {
    font-family: 'Space Grotesk', 'Noto Sans SC', sans-serif;
    font-size: 36px; font-weight: 700;
    color: var(--brand-gold); line-height: 1;
  }
  .hero .stat .l {
    font-size: 10px; color: rgba(255,255,255,0.72);
    margin-top: 4px; letter-spacing: 0.15em;
    font-family: 'Space Grotesk', sans-serif; font-weight: 600;
  }

  /* Filter chips */
  .filters {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-bottom: 28px;
  }
  .chip {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px; font-weight: 700;
    padding: 8px 16px;
    background: rgba(255,255,255,0.8); color: var(--ink);
    border-radius: 999px;
    border: 1px solid var(--border-soft);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }
  .chip:hover { border-color: var(--brand-red); color: var(--brand-red); }
  .chip.active {
    background: var(--ink); color: #fff; border-color: var(--ink);
  }
  .chip .count {
    opacity: 0.55;
    margin-left: 6px;
    font-weight: 500;
  }

  /* Article list */
  .list {
    display: flex; flex-direction: column; gap: 14px;
  }
  .article {
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(14px);
    border: 1px solid var(--border-soft);
    border-radius: 18px;
    padding: 20px 24px;
    text-decoration: none; color: inherit;
    display: grid;
    grid-template-columns: 88px 1fr auto;
    gap: 20px;
    align-items: start;
    transition: all 0.2s ease;
    box-shadow: 0 6px 20px rgba(16,22,47,0.05);
    cursor: pointer;
  }
  .article:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(16,22,47,0.12);
    border-color: rgba(255,87,87,0.35);
  }
  .article .date-block {
    font-family: 'Space Grotesk', sans-serif;
    padding: 14px 10px;
    border-radius: 12px;
    background: linear-gradient(145deg, var(--ink), #2a3b7a);
    color: #fff;
    text-align: center;
  }
  .article .date-block .m { font-size: 10px; font-weight: 600; letter-spacing: 0.15em; color: var(--brand-gold); }
  .article .date-block .d { font-size: 22px; font-weight: 700; line-height: 1; margin: 3px 0; }
  .article .date-block .y { font-size: 9px; color: rgba(255,255,255,0.72); font-weight: 600; }

  .article .content { min-width: 0; }
  .article .type-badge {
    display: inline-block;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10px; font-weight: 700;
    padding: 3px 10px; border-radius: 999px;
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }
  .article .type-badge.daily {
    background: rgba(255,87,87,0.1); color: var(--brand-red);
  }
  .article .type-badge.original {
    background: rgba(16,22,47,0.08); color: var(--ink);
  }
  .article .title {
    font-family: 'Playfair Display', 'Noto Sans SC', sans-serif;
    font-size: 17px; font-weight: 900;
    line-height: 1.35;
    margin-bottom: 6px;
    color: var(--ink);
  }
  .article .desc {
    font-size: 13px; color: var(--muted);
    line-height: 1.7;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .article .tags {
    display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap;
  }
  .article .tags span {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10px; font-weight: 600;
    padding: 2px 8px; border-radius: 4px;
    background: rgba(16,22,47,0.06); color: var(--ink);
  }
  .article .arrow {
    color: var(--brand-red); font-size: 20px;
    transition: transform 0.2s;
    align-self: center;
  }
  .article:hover .arrow { transform: translateX(4px); }

  .article .actions {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-top: 10px;
  }
  .article .mp-link {
    display: inline-flex; align-items: center; gap: 4px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px; font-weight: 700;
    padding: 5px 10px; border-radius: 6px;
    text-decoration: none;
    background: rgba(16,22,47,0.06); color: var(--ink);
    border: 1px solid var(--border-soft);
    letter-spacing: 0.03em;
    transition: all 0.15s;
  }
  .article .mp-link:hover {
    background: var(--brand-red); color: #fff;
    border-color: var(--brand-red);
    transform: translateY(-1px);
  }
  .article .mp-link.poster {
    background: rgba(255,212,77,0.18); color: #8a6500;
    border-color: rgba(255,212,77,0.4);
  }
  .article .mp-link.poster:hover {
    background: var(--brand-gold); color: var(--ink);
    border-color: var(--brand-gold);
  }

  .empty {
    padding: 60px 30px; text-align: center;
    background: rgba(255,255,255,0.6);
    border: 1px dashed var(--border-soft); border-radius: 18px;
    color: var(--muted);
  }

  .footer {
    margin-top: 60px; padding-top: 24px;
    border-top: 1px solid var(--border-soft);
    font-size: 12px; color: var(--muted);
    text-align: center;
  }
  .footer code {
    background: rgba(255,255,255,0.8);
    padding: 2px 8px; border-radius: 4px;
    font-family: 'Space Grotesk', monospace;
  }
  .footer a { color: var(--brand-red); text-decoration: none; }

  @media (max-width: 700px) {
    body { padding: 24px 14px 60px; }
    .hero { padding: 28px 22px; }
    .hero h1 { font-size: 28px; }
    .article {
      grid-template-columns: auto 1fr;
      gap: 14px; padding: 16px 18px;
    }
    .article .date-block {
      display: inline-flex; gap: 8px; align-items: baseline;
      padding: 8px 12px;
    }
    .article .date-block .m { font-size: 10px; }
    .article .date-block .d { font-size: 18px; margin: 0; }
    .article .arrow { grid-column: 1 / -1; text-align: right; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="breadcrumb">
    <a href="../">← 素材中心</a>
    <span class="sep">/</span>
    <span class="current">AI 文章</span>
  </div>

  <div class="hero">
    <h1>AI <em>文章</em> · 日报 + 原创</h1>
    <div class="sub">
      每天 AEST 09:00 自动产 AI 日报（5 条热点）+ 1-2 篇原创深度文章。
      点击进入 <code>jiangren.com.au/blog/{slug}</code> 看全文。
    </div>
    <div class="stats">
      <div class="stat"><div class="n" id="stat-total">–</div><div class="l">TOTAL</div></div>
      <div class="stat"><div class="n" id="stat-daily">–</div><div class="l">DAILY</div></div>
      <div class="stat"><div class="n" id="stat-original">–</div><div class="l">ORIGINAL</div></div>
      <div class="stat"><div class="n" id="stat-latest">–</div><div class="l">LATEST</div></div>
    </div>
  </div>

  <div class="filters" id="filters">
    <span class="chip active" data-filter="all">全部 <span class="count" id="c-all">–</span></span>
    <span class="chip" data-filter="daily">AI 日报 <span class="count" id="c-daily">–</span></span>
    <span class="chip" data-filter="it-daily">IT 认证 & 课程 <span class="count" id="c-it-daily">–</span></span>
    <span class="chip" data-filter="original">原创深度 <span class="count" id="c-original">–</span></span>
  </div>

  <div class="list" id="list">
    <div class="empty">⏳ 载入中...</div>
  </div>

  <div class="footer">
    数据源：<code>jr-wiki manifest.json</code> · 文章正文：
    <a href="https://jiangren.com.au/blog">jiangren.com.au/blog</a> ·
    产出 skill：<code>.claude/skills/ai-daily-news.md</code>
  </div>

</div>

<script>
const MONTH_EN = ['', 'JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

function parseDate(s) {
  if (!s) return null;
  // 支持 "2026-04-20" 或 "2026-04-20T00:00:00.000Z"
  const d = new Date(s);
  return isNaN(d) ? null : d;
}
function formatDate(d) {
  return {
    m: MONTH_EN[d.getMonth() + 1],
    d: String(d.getDate()).padStart(2, '0'),
    y: String(d.getFullYear()),
    iso: d.toISOString().slice(0, 10),
  };
}
function classify(article) {
  if (article.slug && article.slug.startsWith('it-daily-')) return 'it-daily';
  if (article.slug && article.slug.startsWith('ai-daily-')) return 'daily';
  const tags = article.tags || [];
  if (tags.includes('it-certs') || tags.includes('it-daily')) return 'it-daily';
  if (tags.includes('ai-daily') || tags.includes('ai-news')) return 'daily';
  return 'original';
}

async function load() {
  try {
    const res = await fetch('../manifest.json');
    const m = await res.json();
    const articles = (m.articles || []).filter(a => a.slug && a.title);
    // 按 publishDate 倒序
    articles.sort((a, b) => (b.publishDate || '').localeCompare(a.publishDate || ''));
    render(articles);
  } catch (e) {
    document.getElementById('list').innerHTML =
      '<div class="empty">⚠️ 载入失败 ' + (e.message || '') +
      '<br><br>本地预览若读不到 <code>../manifest.json</code>，确认跑了 <code>bun run build.ts</code> 后用 dist/ 当 server 根目录。</div>';
    console.error(e);
  }
}

function render(articles) {
  // Stats
  const daily = articles.filter(a => classify(a) === 'daily');
  const itDaily = articles.filter(a => classify(a) === 'it-daily');
  const original = articles.filter(a => classify(a) === 'original');
  document.getElementById('stat-total').textContent = articles.length;
  document.getElementById('stat-daily').textContent = daily.length;
  document.getElementById('stat-original').textContent = original.length;
  document.getElementById('c-all').textContent = articles.length;
  document.getElementById('c-daily').textContent = daily.length;
  document.getElementById('c-it-daily').textContent = itDaily.length;
  document.getElementById('c-original').textContent = original.length;
  if (articles[0]?.publishDate) {
    document.getElementById('stat-latest').textContent = articles[0].publishDate.slice(5);
  }

  const list = document.getElementById('list');
  const filterChips = document.querySelectorAll('.chip');
  // 支持 ?filter=it-daily 这种 URL 参数预选 chip
  const urlFilter = new URLSearchParams(window.location.search).get('filter');
  const validFilters = ['all', 'daily', 'it-daily', 'original'];
  let activeFilter = validFilters.includes(urlFilter) ? urlFilter : 'all';
  filterChips.forEach(c => {
    c.classList.toggle('active', c.dataset.filter === activeFilter);
  });

  function rerender() {
    const filtered = activeFilter === 'all'
      ? articles
      : articles.filter(a => classify(a) === activeFilter);

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty">空</div>';
      return;
    }

    list.innerHTML = filtered.map(a => {
      const d = parseDate(a.publishDate);
      const df = d ? formatDate(d) : { m: '--', d: '--', y: '--' };
      const type = classify(a);
      const typeLabel = type === 'daily' ? 'AI 日报' : (type === 'it-daily' ? 'IT 认证' : '原创深度');
      const tags = (a.tags || []).slice(0, 4);
      const url = `https://jiangren.com.au/blog/${a.slug}`;

      // AI 日报 slug 形如 ai-daily-YYYY-MM-DD，对应 /ai-news-posters/{date}/ 有发稿页 + 海报库
      const aiDailyMatch = (a.slug || '').match(/^ai-daily-(\d{4}-\d{2}-\d{2})$/);
      const mpUrl = aiDailyMatch ? `../ai-news-posters/${aiDailyMatch[1]}/mp-article.html` : null;
      const posterUrl = aiDailyMatch ? `../ai-news-posters/${aiDailyMatch[1]}/` : null;

      return `
        <div class="article" data-href="${url}">
          <div class="date-block">
            <div class="m">${df.m}</div>
            <div class="d">${df.d}</div>
            <div class="y">${df.y}</div>
          </div>
          <div class="content">
            <span class="type-badge ${type}">${typeLabel}</span>
            <div class="title">${escapeHtml(a.title)}</div>
            <div class="desc">${escapeHtml(a.description || '')}</div>
            ${tags.length ? `<div class="tags">${tags.map(t => `<span>#${escapeHtml(t)}</span>`).join('')}</div>` : ''}
            ${mpUrl ? `
              <div class="actions">
                <a class="mp-link" href="${mpUrl}" target="_blank" rel="noopener" data-stop>📋 复制公众号富文本 →</a>
                <a class="mp-link poster" href="${posterUrl}" target="_blank" rel="noopener" data-stop>🖼 海报库 →</a>
              </div>
            ` : ''}
          </div>
          <div class="arrow">→</div>
        </div>
      `;
    }).join('');
  }

  filterChips.forEach(chip => {
    chip.addEventListener('click', () => {
      filterChips.forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activeFilter = chip.dataset.filter;
      rerender();
    });
  });

  // Card 整体可点（去 jiangren.com.au）；点 .actions 里的 mp-link 走自己的 URL
  list.addEventListener('click', (e) => {
    if (e.target.closest('[data-stop]')) return;
    const card = e.target.closest('[data-href]');
    if (card) window.open(card.dataset.href, '_blank', 'noopener');
  });

  rerender();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
  }[c]));
}

load();
</script>
</body>
</html>
